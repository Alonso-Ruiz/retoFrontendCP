<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a0a00"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>
    <linearGradient id="seatGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e50914"/>
      <stop offset="100%" stop-color="#8b0000"/>
    </linearGradient>
    <linearGradient id="armGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c0392b"/>
      <stop offset="100%" stop-color="#6b0000"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="96" fill="url(#bgGrad)" stroke="#e50914" stroke-width="1.5" opacity="0.9"/>
  
  <!-- Subtle inner ring -->
  <circle cx="100" cy="100" r="88" fill="none" stroke="#e50914" stroke-width="0.4" opacity="0.3"/>

  <!-- SEAT: Base / legs -->
  <!-- Left leg -->
  <rect x="62" y="148" width="10" height="22" rx="3" fill="#6b0000"/>
  <!-- Right leg -->
  <rect x="128" y="148" width="10" height="22" rx="3" fill="#6b0000"/>

  <!-- SEAT: Seat cushion -->
  <rect x="55" y="118" width="90" height="36" rx="8" fill="url(#seatGrad)"/>
  <!-- Seat cushion highlight -->
  <rect x="60" y="120" width="80" height="12" rx="5" fill="#e50914" opacity="0.25"/>

  <!-- SEAT: Left armrest -->
  <rect x="44" y="100" width="18" height="52" rx="6" fill="url(#armGrad)"/>
  <!-- Left armrest top cap -->
  <rect x="42" y="96" width="22" height="10" rx="4" fill="#c0392b"/>

  <!-- SEAT: Right armrest -->
  <rect x="138" y="100" width="18" height="52" rx="6" fill="url(#armGrad)"/>
  <!-- Right armrest top cap -->
  <rect x="136" y="96" width="22" height="10" rx="4" fill="#c0392b"/>

  <!-- SEAT: Backrest -->
  <rect x="55" y="56" width="90" height="70" rx="10" fill="url(#seatGrad)"/>
  <!-- Backrest panel detail -->
  <rect x="63" y="64" width="74" height="54" rx="7" fill="#8b0000" opacity="0.5"/>
  <!-- Backrest center stitch line -->
  <line x1="100" y1="66" x2="100" y2="116" stroke="#e50914" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>

  <!-- SEAT: Headrest -->
  <rect x="68" y="42" width="64" height="24" rx="10" fill="url(#seatGrad)" filter="url(#glow)"/>
  <!-- Headrest highlight -->
  <rect x="74" y="45" width="52" height="8" rx="4" fill="#ff2020" opacity="0.2"/>

  <!-- Film reel decorative element - top left -->
  <circle cx="38" cy="42" r="14" fill="none" stroke="#e50914" stroke-width="1.5" opacity="0.6" filter="url(#softglow)"/>
  <circle cx="38" cy="42" r="4" fill="#e50914" opacity="0.7"/>
  <line x1="38" y1="28" x2="38" y2="56" stroke="#e50914" stroke-width="1" opacity="0.4"/>
  <line x1="24" y1="42" x2="52" y2="42" stroke="#e50914" stroke-width="1" opacity="0.4"/>
  <line x1="28" y1="32" x2="48" y2="52" stroke="#e50914" stroke-width="1" opacity="0.4"/>
  <line x1="48" y1="32" x2="28" y2="52" stroke="#e50914" stroke-width="1" opacity="0.4"/>

  <!-- Film reel decorative element - bottom right -->
  <circle cx="162" cy="158" r="14" fill="none" stroke="#e50914" stroke-width="1.5" opacity="0.6" filter="url(#softglow)"/>
  <circle cx="162" cy="158" r="4" fill="#e50914" opacity="0.7"/>
  <line x1="162" y1="144" x2="162" y2="172" stroke="#e50914" stroke-width="1" opacity="0.4"/>
  <line x1="148" y1="158" x2="176" y2="158" stroke="#e50914" stroke-width="1" opacity="0.4"/>
  <line x1="152" y1="148" x2="172" y2="168" stroke="#e50914" stroke-width="1" opacity="0.4"/>
  <line x1="172" y1="148" x2="152" y2="168" stroke="#e50914" stroke-width="1" opacity="0.4"/>

  <!-- Stars accent -->
  <circle cx="155" cy="48" r="2" fill="#e50914" opacity="0.8"/>
  <circle cx="162" cy="38" r="1.2" fill="#e50914" opacity="0.5"/>
  <circle cx="148" cy="36" r="1.5" fill="#e50914" opacity="0.6"/>
  <circle cx="45" cy="160" r="2" fill="#e50914" opacity="0.8"/>
  <circle cx="38" cy="168" r="1.2" fill="#e50914" opacity="0.5"/>

</svg>
